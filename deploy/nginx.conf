# /etc/nginx/sites-available/mcp-sandbox  (symlink into sites-enabled)
# certbot --nginx -d <domain> rewrites this for TLS + adds the :443 block.

server {
    listen 80;
    server_name mcp.heptafox.com;

    location /mcp {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Streamable HTTP needs unbuffered, long-lived streaming responses.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the visitor guide at /.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
